<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emagreça Sem Dieta — WhatsApp Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    width: 800px;
    height: 800px;
    background: #FAF8F5;
    font-family: 'Nunito', sans-serif;
    color: #2D2D2D;
    position: relative;
    overflow: hidden;
  }

  .border {
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 2px solid #7A9E7E;
    border-radius: 8px;
    pointer-events: none;
  }

  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 55px 60px;
    text-align: center;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #3D5A3E;
    letter-spacing: 2px;
    margin: 0 0 10px 0;
  }

  .logo-line {
    width: 60px;
    height: 2px;
    background: #7A9E7E;
    margin: 0 0 40px 0;
  }

  .price-line {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: #2D2D2D;
    line-height: 1.15;
    margin: 0 0 8px 0;
  }

  .price-line .price {
    color: #C4787A;
  }

  .method {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 600;
    color: #3D5A3E;
    margin: 0 0 18px 0;
  }

  .subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: #2D2D2D;
    margin: 0 0 8px 0;
    opacity: 0.8;
  }

  .subtitle-emphasis {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #7A9E7E;
    margin: 0 0 30px 0;
    letter-spacing: 0.5px;
  }

  .link {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #7A9E7E;
    margin: 0 0 28px 0;
    padding: 8px 30px;
    border: 2px solid #7A9E7E;
    border-radius: 30px;
    letter-spacing: 0.5px;
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(8, 9px);
    grid-template-rows: repeat(8, 9px);
    gap: 2px;
    margin-bottom: 24px;
  }

  .qr-cell {
    width: 9px;
    height: 9px;
    border-radius: 1px;
  }

  .qr-cell.filled { background: #2D2D2D; }
  .qr-cell.empty  { background: #E0DCD7; }

  .footer {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #7A9E7E;
    letter-spacing: 1px;
    margin: 0;
  }
</style>
</head>
<body>

<div class="border"></div>

<div class="content">
  <p class="logo">Longetividade</p>
  <div class="logo-line"></div>

  <p class="price-line">Ebook <span class="price">R$37</span></p>
  <p class="method">M&eacute;todo S.E.M</p>

  <p class="subtitle">Emagreça Sem Dieta &mdash; Para Mulheres Ocupadas</p>
  <p class="subtitle-emphasis">Saud&aacute;vel &bull; Equilibrado &bull; Meu ritmo</p>

  <div class="link">longetividade.com.br</div>

  <div class="qr-grid">
    <div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div>
    <div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div>
    <div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div>
    <div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div>
    <div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div>
    <div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div>
    <div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div>
    <div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell empty"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div><div class="qr-cell filled"></div>
  </div>

  <p class="footer">Acesso imediato &bull; Garantia 7 dias</p>
</div>

</body>
</html>
