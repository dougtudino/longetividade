<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emagreça Sem Dieta — Capa Oficial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    width: 794px;
    height: 1123px;
    background: #FAF8F5;
    font-family: 'Nunito', sans-serif;
    color: #2D2D2D;
    position: relative;
    overflow: hidden;
  }

  .border-frame {
    position: absolute;
    top: 30px; left: 30px; right: 30px; bottom: 30px;
    border: 1.5px solid #7A9E7E;
    pointer-events: none;
  }

  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 70px;
    text-align: center;
  }

  .leaf-top {
    position: absolute;
    top: 60px;
    left: 60px;
  }

  .leaf-top-right {
    position: absolute;
    top: 60px;
    right: 60px;
  }

  .leaf-bottom {
    position: absolute;
    bottom: 70px;
    right: 80px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 62px;
    font-weight: 700;
    color: #2D2D2D;
    line-height: 1.15;
    margin: 0 0 20px 0;
    letter-spacing: -0.5px;
  }

  .divider {
    width: 180px;
    height: 1.5px;
    background: #7A9E7E;
    margin: 10px 0 28px 0;
  }

  .subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #2D2D2D;
    margin: 0 0 40px 0;
    letter-spacing: 0.5px;
  }

  .author {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #7A9E7E;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 0 0 60px 0;
  }

  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: auto;
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(8, 10px);
    grid-template-rows: repeat(8, 10px);
    gap: 2px;
    margin-bottom: 20px;
  }

  .qr-cell {
    width: 10px;
    height: 10px;
    border-radius: 1px;
  }

  .qr-cell.filled { background: #2D2D2D; }
  .qr-cell.empty  { background: #E8E4DF; }

  .pages-text {
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #7A9E7E;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="border-frame"></div>
