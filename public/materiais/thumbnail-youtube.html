<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emagreça Sem Dieta — YouTube Thumbnail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    width: 1280px;
    height: 720px;
    background: #7A9E7E;
    font-family: 'Nunito', sans-serif;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial gradient for depth */
  .bg-gradient {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(61,90,62,0.5) 0%, transparent 70%);
  }

  .layout {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
  }

  .left-side {
    width: 440px;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
  }

  .right-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 60px 40px 20px;
    position: relative;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 82px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.05;
    margin: 0 0 5px 0;
    text-shadow: 2px 3px 8px rgba(0,0,0,0.3);
  }

  .main-title .highlight {
    color: #FAF8F5;
    background: rgba(45,45,45,0.3);
    padding: 0 12px;
    border-radius: 6px;
  }

  .sub-text {
    font-family: 'Nunito', sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: #D4A94B;
    margin: 15px 0 0 0;
    text-shadow: 1px 2px 6px rgba(0,0,0,0.3);
  }

  .watermark {
    position: absolute;
    bottom: 20px;
    right: 30px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* Arrow SVG */
  .arrow {
    position: absolute;
    left: -30px;
    top: 50%;
    transform: translateY(20px);
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="layout">
  <div class="left-side">
    <!-- Woman silhouette SVG — confident posture, chest up -->
    <svg width="360" height="620" viewBox="0 0 360 620" fill="none" style="margin-bottom:0">
      <!-- Hair -->
      <ellipse cx="180" cy="100" rx="70" ry="80" fill="#3D5A3E"/>
      <path d="M110 100 C110 60 140 20 180 20 C220 20 250 60 250 100 C250 80 240 50 220 40 C200 30 160 30 140 40 C120 50 110 80 110 100Z" fill="#2D2D2D" opacity="0.3"/>
      <!-- Hair flowing right -->
      <path d="M240 80 C260 90 275 130 270 170 C265 200 250 220 245 200 C240 180 255 140 240 100Z" fill="#3D5A3E"/>
      <!-- Face -->
      <ellipse cx="180" cy="115" rx="52" ry="62" fill="#E8D5C4"/>
      <!-- Neck -->
      <rect x="165" y="170" width="30" height="40" rx="10" fill="#E8D5C4"/>
      <!-- Shoulders & torso -->
      <path d="M120 210 C140 195 165 200 180 200 C195 200 220 195 240 210 C270 230 285 270 290 320 L280 540 C270 570 230 590 180 590 C130 590 90 570 80 540 L70 320 C75 270 90 230 120 210Z" fill="#3D5A3E"/>
      <!-- Neckline detail -->
      <path d="M145 210 C160 230 180 240 180 240 C180 240 200 230 215 210" fill="none" stroke="#2D5A2E" stroke-width="2"/>
      <!-- Arms -->
      <path d="M120 215 C95 240 80 290 75 330 C72 350 78 355 85 340 C95 310 100 270 120 240Z" fill="#E8D5C4"/>
      <path d="M240 215 C265 240 280 290 285 330 C288 350 282 355 275 340 C265 310 260 270 240 240Z" fill="#E8D5C4"/>
      <!-- Subtle smile -->
      <path d="M165 135 C170 142 190 142 195 135" fill="none" stroke="#C4787A" stroke-width="2" stroke-linecap="round"/>
      <!-- Eyes -->
      <ellipse cx="163" cy="110" rx="6" ry="4" fill="#2D2D2D"/>
      <ellipse cx="197" cy="110" rx="6" ry="4" fill="#2D2D2D"/>
    </svg>
  </div>

  <div class="right-side">
    <!-- Gold arrow pointing to text -->
    <svg class="arrow" width="60" height="60" viewBox="0 0 60 60">
      <path d="M5 30 L45 30 L35 15 M45 30 L35 45" fill="none" stroke="#D4A94B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <h1 class="main-title">Emagreça<br><span class="highlight">SEM</span> dieta</h1>
    <p class="sub-text">(funciona de verdade)</p>
  </div>
</div>

<span class="watermark">Longetividade</span>

</body>
</html>
