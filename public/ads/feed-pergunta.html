<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Feed Pergunta — Método S.E.M</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1080px;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    background: #FAF8F5;
    background-image: radial-gradient(circle, #d5d0c8 1px, transparent 1px);
    background-size: 30px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 62px;
    font-weight: 700;
    color: #2D2D2D;
    text-align: center;
    line-height: 1.25;
    max-width: 820px;
    margin-bottom: 70px;
  }

  .checks {
    display: flex;
    flex-direction: column;
    gap: 36px;
    margin-bottom: 80px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .checkbox {
    width: 48px;
    height: 48px;
    min-width: 48px;
    background: #7A9E7E;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .checkbox svg {
    width: 28px;
    height: 28px;
  }

  .check-item span {
    font-size: 34px;
    color: #2D2D2D;
    font-weight: 600;
  }

  .cta {
    background: #7A9E7E;
    color: #fff;
    font-size: 34px;
    font-weight: 700;
    padding: 24px 56px;
    border-radius: 60px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    position: absolute;
    bottom: 36px;
    right: 44px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #7A9E7E;
    font-weight: 700;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="headline">Você já tentou emagrecer e voltou ao peso?</div>

  <div class="checks">
    <div class="check-item">
      <div class="checkbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span>Tentei dieta restritiva e desisti</span>
    </div>
    <div class="check-item">
      <div class="checkbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span>Como por ansiedade à noite</span>
    </div>
    <div class="check-item">
      <div class="checkbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span>Sinto culpa toda vez que "erro"</span>
    </div>
  </div>

  <div class="cta">Existe um jeito diferente <span style="font-size:38px;">→</span></div>

  <div class="logo">Longetividade</div>
</body>
</html>
