<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Reels Cover — Método S.E.M</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1920px;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    background: #7A9E7E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    position: relative;
  }

  .hook {
    font-family: 'Playfair Display', serif;
    font-size: 82px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    line-height: 1.2;
    max-width: 820px;
  }

  .subtitle {
    font-size: 40px;
    font-weight: 700;
    color: #FAF8F5;
    opacity: 0.8;
    text-align: center;
  }

  .arrow {
    margin-top: 30px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  .arrow svg {
    width: 64px;
    height: 64px;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(24px); }
  }

  .logo {
    position: absolute;
    bottom: 60px;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="hook">Por que você come mais à noite?</div>
  <div class="subtitle">A resposta vai mudar tudo</div>

  <div class="arrow">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <div class="logo">Longetividade</div>
</body>
</html>
