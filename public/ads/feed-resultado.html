<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Feed Resultado — Método S.E.M</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1080px;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .main {
    display: flex;
    flex: 1;
  }

  .left {
    width: 50%;
    background: #7A9E7E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .left .number {
    font-family: 'Playfair Display', serif;
    font-size: 200px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -4px;
  }

  .left .sub {
    font-size: 38px;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    margin-top: 10px;
  }

  .right {
    width: 50%;
    background: #FAF8F5;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 55px;
    gap: 48px;
  }

  .bullet {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .bullet .check {
    width: 52px;
    height: 52px;
    min-width: 52px;
    background: #7A9E7E;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bullet .check svg {
    width: 28px;
    height: 28px;
  }

  .bullet span {
    font-size: 34px;
    font-weight: 700;
    color: #2D2D2D;
    line-height: 1.3;
  }

  .footer {
    background: #2D2D2D;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .footer span {
    font-size: 28px;
    color: #FAF8F5;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .footer .dot {
    width: 8px;
    height: 8px;
    background: #D4A94B;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="main">
    <div class="left">
      <div class="number">-6kg</div>
      <div class="sub">em 5 semanas</div>
    </div>
    <div class="right">
      <div class="bullet">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Sem cortar alimentos</span>
      </div>
      <div class="bullet">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Sem academia obrigatória</span>
      </div>
      <div class="bullet">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Sem passar fome</span>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>Método S.E.M</span>
    <div class="dot"></div>
    <span>longetividade.com.br</span>
  </div>
</body>
</html>
